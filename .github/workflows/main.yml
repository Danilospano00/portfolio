name: Deploy to Raspberry Pi

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore .env.local
        run: cp /home/danilo/.env.portfolio .env.local

      - name: Build and restart
        run: |
          docker compose up --build -d
          docker image prune -f